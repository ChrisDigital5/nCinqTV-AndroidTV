name: Android TV Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/ncinqtv-release.jks

      - name: Test and build
        env:
          NCINQ_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          NCINQ_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          NCINQ_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew test assembleRelease

      - name: Name APK
        run: cp app/build/outputs/apk/release/app-release.apk ncinq-tv-${{ github.ref_name }}.apk

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ncinq-tv-${{ github.ref_name }}.apk
          generate_release_notes: true
