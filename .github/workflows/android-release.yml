name: Android TV Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/ncinqtv-release.jks

      - name: Test and build
        env:
          NCINQ_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          NCINQ_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          NCINQ_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew test assembleRelease

      - name: Name APK
        run: cp app/build/outputs/apk/release/app-release.apk ncinq-tv-${{ github.ref_name }}.apk

      - name: Build release notes
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
            release_range="${previous_tag}..${GITHUB_SHA}"
          else
            release_range="${GITHUB_SHA}"
          fi
          {
            echo "What's changed"
            echo
            git log --no-merges --format='- %s' "$release_range"
          } > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3 4 5; do
            gh release create "$GITHUB_REF_NAME" \
              "ncinq-tv-${GITHUB_REF_NAME}.apk" \
              --notes-file release-notes.md \
              --title "$GITHUB_REF_NAME" && exit 0
            echo "GitHub release API unavailable (attempt $attempt of 5)"
            sleep 20
          done
          exit 1
